apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: micro-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/amanghz/micro-demo-gitops.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
